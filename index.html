<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escala de Plantão</title>

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║   DADOS COMPARTILHADOS (Firebase) - Leia as instruções abaixo   ║

  ║  PASSO 3) Em "Regras", cole: { "rules":{".read":true,".write":true} }
  ║  PASSO 4) Em Configurações do projeto copie o objeto firebaseConfig

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;min-height:100vh;padding:24px 16px;color:#111}
    h1{font-size:22px;font-weight:600}
    .container{max-width:1020px;margin:0 auto}
    .card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:16px}
    input,select,textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;outline:none;font-family:inherit}
    input:focus,select:focus,textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
    .btn{padding:8px 16px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
    .btn:hover:not([disabled]){background:#f9fafb;border-color:#9ca3af}
    .btn[disabled]{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#6366f1;color:#fff;border-color:#6366f1}
    .btn-primary:hover:not([disabled]){background:#4f46e5;border-color:#4f46e5}
    .btn-green{background:#10b981;color:#fff;border-color:#10b981}
    .btn-green:hover:not([disabled]){background:#059669}
    .btn-orange{background:#f59e0b;color:#fff;border-color:#f59e0b}
    .btn-red{background:#ef4444;color:#fff;border-color:#ef4444}
    .btn-icon{padding:3px 7px;border:none;background:none;cursor:pointer;font-size:15px;border-radius:6px;line-height:1}
    .btn-icon:hover{background:#f3f4f6}
    .tab{padding:9px 16px;font-size:13px;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;color:#6b7280;font-family:inherit;transition:all .15s}
    .tab.active{color:#111;border-bottom-color:#6366f1;font-weight:600}
    .badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:9px 12px;text-align:left;font-weight:500;font-size:11px;color:#6b7280;border-bottom:1px solid #e5e7eb;background:#f9fafb;white-space:nowrap}
    td{padding:9px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top}
    tr:hover td{background:#fafafa}
    tr:last-child td{border-bottom:none}
    .row-we td{background:#fffbeb!important}
    .row-he td{background:#fdf4ff!important}
    .empty{padding:40px;text-align:center;border:1px dashed #d1d5db;border-radius:12px;color:#9ca3af;font-size:13px}
    .alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
    .alert-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
    .alert-info{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
    .alert-err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .alert-ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
    .msg-err{font-size:12px;color:#dc2626;margin-top:6px}
    .label{font-size:12px;color:#6b7280;display:block;margin-bottom:5px;font-weight:500}
    .section-title{font-size:14px;font-weight:600;color:#111;margin-bottom:14px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
    .flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .member-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid #f3f4f6}
    .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:24px;max-width:540px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:4px;font-weight:500;margin-left:4px}
    .tag-we{background:#fef3c7;color:#92400e}
    .tag-he{background:#fce7f3;color:#9d174d}
    .tag-sp{background:#ede9fe;color:#5b21b6}
    .tag-sw{background:#fce7f3;color:#be185d}
    .tag-ex{background:#d1fae5;color:#065f46}
    .tag-in{background:#f3f4f6;color:#9ca3af;font-size:11px;padding:1px 7px;border-radius:5px}
    .tag-aus{background:#fef3c7;color:#92400e;font-size:11px;padding:1px 7px;border-radius:5px}
    .turno-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
    .turno-manha{background:#dbeafe;color:#1e40af}
    .turno-noite{background:#ede9fe;color:#4c1d95}
    .row-manha td{border-left:3px solid #93c5fd}
    .row-noite td{border-left:3px solid #a78bfa}
    .info-box{background:#f9fafb;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px}
    .wa-link{color:#25d366;text-decoration:none;font-size:11px;display:inline-flex;align-items:center;gap:3px;margin-top:2px}
    .preview-scroll{max-height:380px;overflow-y:auto}
    .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:8px}
    .aus-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f3f4f6;gap:8px;font-size:13px}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block;margin-right:4px}
    .sync-dot.local{background:#9ca3af}
    @media(max-width:600px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<!-- Modal Feriados -->
<div class="modal-overlay" id="modal-feriados">
  <div class="modal" style="max-width:480px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><strong>🎉 Feriados</strong><br><span style="font-size:12px;color:#6b7280">Dois turnos: 08:00-18:00 e 18:00-08:00</span></div>
      <button class="btn-icon" onclick="closeModal('modal-feriados')">✕</button>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">Data</label><input type="date" id="fer-data"/></div>
      <div><label class="label">Nome</label><input id="fer-nome" placeholder="Ex: Natal"/></div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="addFeriado()">+ Adicionar feriado</button>
    <div id="fer-list"></div>
  </div>
</div>

<!-- Modal Ausências -->
<div class="modal-overlay" id="modal-ausencias">
  <div class="modal" style="max-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><strong>📋 Ausências do Plantonista</strong><br><span id="aus-subtitle" style="font-size:12px;color:#6b7280"></span></div>
      <button class="btn-icon" onclick="closeModal('modal-ausencias')">✕</button>
    </div>
    <div style="margin-bottom:12px">
      <label class="label">Tipo de ausência</label>
      <select id="aus-tipo">
        <option value="ferias">🏖️ Férias</option>
        <option value="atestado">🤒 Atestado Médico</option>
        <option value="licenca-medica">🏥 Licença Médica</option>
        <option value="licenca-mat">👶 Licença Maternidade / Paternidade</option>
        <option value="outros">📋 Outros</option>
      </select>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">Data início</label><input type="date" id="aus-ini"/></div>
      <div><label class="label">Data fim</label><input type="date" id="aus-fim"/></div>
    </div>
    <div style="margin-bottom:12px">
      <label class="label">Observação (opcional)</label>
      <input id="aus-obs" placeholder="Motivo ou detalhes..."/>
    </div>
    <button class="btn btn-green" style="width:100%;justify-content:center;margin-bottom:16px" onclick="addAusencia()">+ Registrar ausência</button>
    <div id="aus-list"></div>
  </div>
</div>

<!-- Modal Editar Escala -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><strong id="edit-title"></strong><br><span id="edit-dow" style="font-size:12px;color:#6b7280"></span></div>
      <button class="btn-icon" onclick="closeModal('modal-edit')">✕</button>
    </div>
    <div class="info-box" id="edit-current"></div>
    <div style="margin-bottom:14px">
      <label class="label" style="font-weight:600">Plantonistas extras</label>
      <div class="chip-row" id="edit-extras-chips"></div>
      <div class="flex-row">
        <select id="edit-extra-pl" style="flex:1"></select>
        <select id="edit-extra-team" style="width:135px">
          <option value="infra">Infra</option>
          <option value="sre">SRE</option>
          <option value="atendimento" selected>Atendimento</option>
        </select>
        <button class="btn btn-green" onclick="addExtra()">+ Extra</button>
      </div>
      <p style="font-size:11px;color:#9ca3af;margin-top:4px">Reforço além dos plantonistas já escalados.</p>
    </div>
    <div style="margin-bottom:16px">
      <label class="label" style="font-weight:600">Observação</label>
      <textarea id="edit-obs" rows="2" placeholder="Condições especiais deste plantão..."></textarea>
    </div>
    <div class="flex-row" style="justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-edit')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditEsc()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Troca -->
<div class="modal-overlay" id="modal-swap">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div><strong>🔄 Registrar Troca</strong><br><span id="swap-subtitle" style="font-size:12px;color:#6b7280"></span></div>
      <button class="btn-icon" onclick="closeModal('modal-swap')">✕</button>
    </div>
    <div style="margin-bottom:12px">
      <label class="label" style="font-weight:600">Time para troca</label>
      <div class="flex-row" id="swap-team-btns"></div>
    </div>
    <div class="info-box" id="swap-current"></div>
    <div style="margin-bottom:12px">
      <label class="label" style="font-weight:600">Trocar com o plantão do dia:</label>
      <select id="swap-target" onchange="updateSwapPreview()"></select>
    </div>
    <div id="swap-preview" style="margin-bottom:12px"></div>
    <div style="margin-bottom:16px">
      <label class="label">Motivo (opcional)</label>
      <input id="swap-obs" placeholder="Motivo da troca..."/>
    </div>
    <div class="flex-row" style="justify-content:flex-end">
      <button class="btn" onclick="closeModal('modal-swap')">Cancelar</button>
      <button class="btn btn-orange" onclick="confirmSwap()">🔄 Confirmar troca</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO FIREBASE — preencha para dados compartilhados
// ════════════════════════════════════════════════════════════════════
// Após configurar: mude USE_FIREBASE para true e descomente os scripts
// do Firebase no <head> desta página.
//
// var FIREBASE_CFG = {
//   apiKey: "AIzaSy...",
//   authDomain: "seu-projeto.firebaseapp.com",
//   databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
//   projectId: "seu-projeto",
//   storageBucket: "seu-projeto.appspot.com",
//   messagingSenderId: "000000000000",
//   appId: "1:000000000000:web:abc123"
// };
// var USE_FIREBASE = true;
var FIREBASE_CFG = null;
var USE_FIREBASE = false;
// ════════════════════════════════════════════════════════════════════

// ─── Constantes ───────────────────────────────────────────────────
var KEY_PL = "plt7-pls";
var KEY_ES = "plt7-esc";
var KEY_FE = "plt7-fer";
var KEY_AU = "plt7-aus";
var TEAMS = [
  { id:"infra",       label:"Infra",       bg:"#dbeafe", c:"#1d4ed8" },
  { id:"sre",         label:"SRE",         bg:"#fef3c7", c:"#92400e" },
  { id:"atendimento", label:"Atendimento", bg:"#d1fae5", c:"#065f46" }
];
var AUS_TIPOS = {
  "ferias":         "🏖️ Férias",
  "atestado":       "🤒 Atestado",
  "licenca-medica": "🏥 Lic. Médica",
  "licenca-mat":    "👶 Lic. Maternidade/Pat.",
  "outros":         "📋 Outros"
};
var DIAS_FULL = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

// ─── Estado global ────────────────────────────────────────────────
var S = {
  tab:"plantonistas", pls:[], esc:[], fer:[], aus:[],
  ps:monthStart(), pe:monthEnd(), prev:[], showPrev:false,
  filterPl:"",
  editId:null, editExtras:[], editObs:"",
  swapId:null, swapTeam:"infra",
  plName:"", plTeam:"infra", plPhone:"", plAtivo:true, plEditId:null, plErr:"", genErr:"",
  ausPl:null,
  prevWarnings:[],
  useCloud:false, dbRef:null
};

// ─── Firebase / Storage ───────────────────────────────────────────
function initStorage(callback) {
  if (USE_FIREBASE && FIREBASE_CFG && typeof firebase !== "undefined") {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CFG);
      S.dbRef = firebase.database().ref("plantao7");
      S.useCloud = true;
      // Listener em tempo real — sincroniza todos os usuários
      S.dbRef.on("value", function(snap) {
        var d = snap.val() || {};
        S.pls = d.pls || [];
        S.esc = d.esc || [];
        S.fer = d.fer || [];
        S.aus = d.aus || [];
        // Espelhar em localStorage como cache offline
        localStorage.setItem(KEY_PL, JSON.stringify(S.pls));
        localStorage.setItem(KEY_ES, JSON.stringify(S.esc));
        localStorage.setItem(KEY_FE, JSON.stringify(S.fer));
        localStorage.setItem(KEY_AU, JSON.stringify(S.aus));
        if (callback) { var cb = callback; callback = null; cb(); }
        else { render(); }
      }, function(err) {
        console.warn("Firebase read error:", err);
        loadLocal(callback);
      });
      return;
    } catch(e) {
      console.warn("Firebase init failed, usando localStorage:", e);
    }
  }
  loadLocal(callback);
}

function loadLocal(callback) {
  S.useCloud = false;
  try { S.pls = JSON.parse(localStorage.getItem(KEY_PL) || "[]"); } catch(e){ S.pls=[]; }
  try { S.esc = JSON.parse(localStorage.getItem(KEY_ES) || "[]"); } catch(e){ S.esc=[]; }
  try { S.fer = JSON.parse(localStorage.getItem(KEY_FE) || "[]"); } catch(e){ S.fer=[]; }
  try { S.aus = JSON.parse(localStorage.getItem(KEY_AU) || "[]"); } catch(e){ S.aus=[]; }
  if (callback) callback();
}

function syncToCloud() {
  if (S.useCloud && S.dbRef) {
    S.dbRef.set({ pls:S.pls, esc:S.esc, fer:S.fer, aus:S.aus })
      .catch(function(e){ console.error("Firebase write error:", e); });
  }
}

function savePls() {
  localStorage.setItem(KEY_PL, JSON.stringify(S.pls));
  syncToCloud();
}
function saveEsc() {
  localStorage.setItem(KEY_ES, JSON.stringify(S.esc));
  syncToCloud();
}
function saveFer() {
  localStorage.setItem(KEY_FE, JSON.stringify(S.fer));
  syncToCloud();
}
function saveAus() {
  localStorage.setItem(KEY_AU, JSON.stringify(S.aus));
  syncToCloud();
}

// ─── Helpers gerais ───────────────────────────────────────────────
function fmt(s) { if (!s) return ""; var p=s.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function nextDay(s) { var d=new Date(s+"T12:00:00"); d.setDate(d.getDate()+1); return d.toISOString().split("T")[0]; }
function prevDay(s) { var d=new Date(s+"T12:00:00"); d.setDate(d.getDate()-1); return d.toISOString().split("T")[0]; }
function dowOf(s) { return new Date(s+"T12:00:00").getDay(); }
function isWE(s) { var d=dowOf(s); return d===0||d===6; }
function isFeriado(s) { return S.fer.some(function(f){ return f.data===s; }); }
function isSpecialDay(s) { return isWE(s)||isFeriado(s); }
function dowFull(s) { return DIAS_FULL[dowOf(s)]||""; }
function monthStart() { var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01"; }
function monthEnd() { var d=new Date(); d.setMonth(d.getMonth()+1); d.setDate(0); return d.toISOString().split("T")[0]; }
function today() { return new Date().toISOString().split("T")[0]; }
function addDays(n) { var d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; }
function pad(n) { return String(n).padStart(2,"0"); }
function dateRange(s,e) {
  var ds=[],c=new Date(s+"T12:00:00"),l=new Date(e+"T12:00:00");
  while(c<=l){ ds.push(c.toISOString().split("T")[0]); c.setDate(c.getDate()+1); }
  return ds;
}
function waLink(phone) { if (!phone) return null; return "https://wa.me/"+phone.replace(/\D/g,""); }
function getFerNome(d) { var f=S.fer.find(function(f){ return f.data===d; }); return f?f.nome:""; }
function getNome(id) { var p=S.pls.find(function(p){ return p.id===id; }); return p?p.nome:"?"; }
function getTeamOf(id) { var p=S.pls.find(function(p){ return p.id===id; }); return p?p.time:""; }
function getPhone(id) { var p=S.pls.find(function(p){ return p.id===id; }); return p&&p.phone?p.phone:""; }
function activePls() { return S.pls.filter(function(p){ return p.ativo!==false; }); }
function tc(tid) { return TEAMS.find(function(t){ return t.id===tid; })||{bg:"#e5e7eb",c:"#374151"}; }
function badge(nome,tid) { var t=tc(tid); return '<span class="badge" style="background:'+t.bg+';color:'+t.c+'">'+he(nome)+'</span>'; }
function he(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function shuf(a) { var b=a.slice(); for(var i=b.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=b[i];b[i]=b[j];b[j]=tmp; } return b; }
function uid() { return (Date.now()+Math.random()).toString(36); }

// ─── Ausências helpers ────────────────────────────────────────────
function isAbsent(plId, dateStr) {
  return S.aus.some(function(a){ return a.plId===plId && dateStr>=a.ini && dateStr<=a.fim; });
}
function getAusenciasOf(plId) { return S.aus.filter(function(a){ return a.plId===plId; }); }
function plAvailable(plId, dateStr) { return !isAbsent(plId, dateStr); }
function ausenciaIcon(tipo) {
  var icons = { "ferias":"🏖️","atestado":"🤒","licenca-medica":"🏥","licenca-mat":"👶","outros":"📋" };
  return icons[tipo]||"📋";
}

// ─── Verifica se plantonista está escalado num dia (no gerado ou no salvo) ───
function escaladoNoDia(plId, dateStr, entryMap) {
  // Verifica no mapa gerado
  var keys = Object.keys(entryMap);
  for (var k=0; k<keys.length; k++) {
    var e = entryMap[keys[k]];
    if (e.data !== dateStr) continue;
    if (TEAMS.some(function(t){ return e[t.id]===plId; })) return true;
  }
  // Verifica nas escalas salvas
  return S.esc.some(function(e){
    if (e.data !== dateStr) return false;
    if (e.infra===plId||e.sre===plId||e.atendimento===plId) return true;
    return (e.extras||[]).some(function(x){ return x.id===plId; });
  });
}

// ─── GERAÇÃO DE ESCALA ────────────────────────────────────────────
function sortear() {
  S.genErr="";
  var ativos = activePls();
  var miss = TEAMS.filter(function(t){
    return ativos.filter(function(p){ return p.time===t.id; }).length===0;
  }).map(function(t){ return t.label; });
  if (miss.length) { S.genErr="Sem plantonistas ativos: "+miss.join(", "); render(); return; }
  if (!S.ps||!S.pe||S.ps>S.pe) { S.genErr="Período inválido."; render(); return; }

  var dates = dateRange(S.ps, S.pe);
  if (!dates.length) { S.genErr="Nenhuma data no período."; render(); return; }

  // Contagem do mês anterior para equilíbrio
  var prevCount = {};
  var periStart = new Date(S.ps+"T12:00:00");
  S.esc.forEach(function(e){
    var d = new Date(e.data+"T12:00:00");
    if (d < periStart) {
      TEAMS.forEach(function(t){
        if (e[t.id]) prevCount[e[t.id]] = (prevCount[e[t.id]]||0)+1;
      });
    }
  });

  var entryMap = {}; // chave: "data_turno"
  var cnt = {};      // contagem de plantões gerados por plantonista
  ativos.forEach(function(p){ cnt[p.id]=0; });

  function getOrCreate(data, turno) {
    var key = data+"_"+turno;
    if (!entryMap[key]) {
      entryMap[key] = { id:uid(), data:data, turno:turno,
        holiday:isFeriado(data), weekend:isWE(data), extras:[], obs:"" };
      TEAMS.forEach(function(t){ entryMap[key][t.id]=null; });
    }
    return entryMap[key];
  }

  TEAMS.forEach(function(t) {
    var pool = shuf(ativos.filter(function(p){ return p.time===t.id; }).slice().sort(function(a,b){
      return (prevCount[a.id]||0)-(prevCount[b.id]||0);
    }));

    dates.forEach(function(data) {
      var turnos = isSpecialDay(data) ? ["manha","noite"] : ["normal"];
      turnos.forEach(function(turno) {
        var entry = getOrCreate(data, turno);
        if (entry[t.id]) return; // já preenchido

        // Candidatos disponíveis (sem ausência nesta data)
        var candidates = pool.filter(function(p){ return plAvailable(p.id, data); });
        if (!candidates.length) return;

        // Ordenar por menor contagem no período atual
        candidates = candidates.slice().sort(function(a,b){ return (cnt[a.id]||0)-(cnt[b.id]||0); });

        // Tentar escolher alguém sem plantão no dia anterior ou posterior,
        // e sem estar escalado em outro turno do mesmo dia
        var chosen = null;
        for (var i=0; i<candidates.length; i++) {
          var cand = candidates[i];
          var prevD = prevDay(data);
          var nextD = nextDay(data);
          var okConsec = !escaladoNoDia(cand.id, prevD, entryMap) &&
                         !escaladoNoDia(cand.id, nextD, entryMap);
          var okSameDay = !escaladoNoDia(cand.id, data, entryMap);
          if (okConsec && okSameDay) { chosen=cand; break; }
        }
        // Fallback: menor contagem, evitando apenas duplicar no mesmo dia
        if (!chosen) {
          var notDup = candidates.filter(function(p){ return !escaladoNoDia(p.id, data, entryMap); });
          chosen = notDup.length ? notDup[0] : candidates[0];
        }
        if (chosen) {
          entry[t.id] = chosen.id;
          cnt[chosen.id] = (cnt[chosen.id]||0)+1;
        }
      });
    });
  });

  // Ordenar resultado
  var result = Object.keys(entryMap).map(function(k){ return entryMap[k]; }).sort(function(a,b){
    if (a.data!==b.data) return a.data.localeCompare(b.data);
    var ord={manha:0,normal:0,noite:1};
    return (ord[a.turno]||0)-(ord[b.turno]||0);
  });

  // Detectar consecutivos (aviso)
  var warnings = [];
  result.forEach(function(e){
    TEAMS.forEach(function(t){
      var plId = e[t.id]; if (!plId) return;
      var prevD = prevDay(e.data), nextD = nextDay(e.data);
      var consec = result.some(function(oe){
        if (oe===e) return false;
        if (oe.data!==prevD&&oe.data!==nextD) return false;
        return TEAMS.some(function(tt){ return oe[tt.id]===plId; });
      }) || S.esc.some(function(se){
        if (se.data!==prevD&&se.data!==nextD) return false;
        return se.infra===plId||se.sre===plId||se.atendimento===plId;
      });
      if (consec && !warnings.some(function(w){ return w.plId===plId&&w.data===e.data; })) {
        warnings.push({plId:plId,data:e.data,nome:getNome(plId)});
      }
    });
  });

  S.prevWarnings = warnings;
  S.prev = result;
  S.showPrev = true;
  render();
}

function confirmarEscala() {
  var ds = {};
  S.prev.forEach(function(e){ ds[e.data+"_"+(e.turno||"normal")]=true; });
  var kept = S.esc.filter(function(e){ return !ds[e.data+"_"+(e.turno||"normal")]; });
  S.esc = kept.concat(S.prev).sort(function(a,b){
    if (a.data!==b.data) return a.data.localeCompare(b.data);
    var ord={manha:0,normal:0,noite:1};
    return (ord[a.turno]||0)-(ord[b.turno]||0);
  });
  saveEsc(); S.showPrev=false; S.prev=[]; S.prevWarnings=[]; S.tab="visualizar"; render();
}
function removeEsc(id) { S.esc=S.esc.filter(function(e){ return e.id!==id; }); saveEsc(); render(); }

// ─── Excel Export ─────────────────────────────────────────────────
function exportarXLSX() {
  if (typeof XLSX === "undefined") { alert("Biblioteca XLSX não carregada."); return; }
  var visEsc = S.filterPl ? S.esc.filter(function(e){
    return e.infra===S.filterPl||e.sre===S.filterPl||e.atendimento===S.filterPl||
      (e.extras||[]).some(function(x){ return x.id===S.filterPl; });
  }) : S.esc;

  if (!visEsc.length) { alert("Nenhuma escala para exportar."); return; }

  var data = visEsc.map(function(e){
    var turno = e.turno||"normal";
    var isManha = turno==="manha";
    var ini = isManha ? "08:00" : "18:00";
    var fim = isManha ? "18:00" : "08:00";
    var fimData = isManha ? e.data : nextDay(e.data);
    var tipo = e.holiday ? "Feriado" : (e.weekend ? "Fim de Semana" : "Dia Útil");
    return {
      "Data":         fmt(e.data),
      "Dia":          dowFull(e.data),
      "Tipo":         tipo,
      "Turno":        isManha ? "Manhã 08-18h" : "Noite 18-08h",
      "Início":       fmt(e.data)+" "+ini,
      "Fim":          fmt(fimData)+" "+fim,
      "Infra":        getNome(e.infra),
      "SRE":          getNome(e.sre),
      "Atendimento":  getNome(e.atendimento),
      "Observação":   e.obs||""
    };
  });

  var ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{wch:12},{wch:16},{wch:14},{wch:16},{wch:20},{wch:20},{wch:20},{wch:20},{wch:20},{wch:30}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Plantão");
  XLSX.writeFile(wb, "escala-plantao.xlsx");
}

  var rng = (S.ps&&S.pe&&S.ps<=S.pe) ? dateRange(S.ps,S.pe) : [];
  var ferN = rng.filter(isFeriado);
  var weN  = rng.filter(isWE);
  var specN = rng.filter(isSpecialDay);
  var html = "";
  if (missing.length) {
    html += '<div class="alert alert-warn">⚠️ Times sem plantonistas ativos: '+missing.map(function(t){ return t.label; }).join(", ")+
      '<button class="btn" style="margin-left:auto;font-size:11px;padding:2px 10px" onclick="setTab(\'plantonistas\')">Cadastrar →</button></div>';
  }
  html += '<div class="card" style="max-width:580px"><p class="section-title">Período do plantão</p>'+
    '<div class="grid2" style="margin-bottom:12px">'+
    '<div><label class="label">Data início</label><input type="date" value="'+S.ps+'" onchange="S.ps=this.value;render()"/></div>'+
    '<div><label class="label">Data fim</label><input type="date" value="'+S.pe+'" min="'+S.ps+'" onchange="S.pe=this.value;render()"/></div></div>';
  if (rng.length) {
    html += '<div style="padding:8px 12px;background:#f3f4f6;border-radius:8px;font-size:12px;color:#6b7280;margin-bottom:12px">'+
      '📅 '+rng.length+' dia'+(rng.length!==1?"s":"")+" &middot; "+fmt(S.ps)+" → "+fmt(S.pe)+
      (ferN.length?'<span style="color:#9d174d;margin-left:8px">&middot; '+ferN.length+' feriado'+(ferN.length>1?"s":"")+'</span>':"")+
      (weN.length?'<span style="color:#92400e;margin-left:8px">&middot; '+weN.length+' FdS</span>':"")+
      (specN.length?'<span style="color:#5b21b6;margin-left:8px">&middot; '+specN.length+' dias com 2 turnos</span>':"")+
      '</div>';
  }
  html += '<div class="flex-row" style="margin-bottom:16px">'+
    '<button class="btn" style="font-size:11px;padding:5px 12px" onclick="S.ps=monthStart();S.pe=monthEnd();render()">Este mês</button>'+
    '<button class="btn" style="font-size:11px;padding:5px 12px" onclick="S.ps=today();S.pe=addDays(6);render()">Próx. 7 dias</button>'+
    '<button class="btn" style="font-size:11px;padding:5px 12px" onclick="S.ps=today();S.pe=addDays(29);render()">Próx. 30 dias</button></div>'+
    '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#166534">'+
    '✅ Regras: <strong>sem plantão consecutivo</strong> &middot; <strong>FdS/Feriados com 2 turnos</strong> &middot; <strong>ausências respeitadas</strong> &middot; <strong>distribuição equilibrada</strong></div>'+
    (S.genErr?'<p class="msg-err">'+he(S.genErr)+'</p>':"")+
    '<button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="sortear()"'+
    ((!S.ps||!S.pe||S.ps>S.pe)?'  disabled':'')+'>🎲 Sortear Escala</button></div>';
  if (ferN.length) {
    html += '<div class="alert alert-info" style="max-width:580px;margin-top:10px">🎉 Feriados: '+

      '<button onclick="S.filterPl=\'\';render()" class="btn" style="margin-left:auto;font-size:11px;padding:2px 8px;background:none;border:none;cursor:pointer;color:#1d4ed8">✕ Limpar</button></div>';
  }

  html += '<div class="flex-row" style="font-size:11px;color:#6b7280;margin-bottom:10px;gap:8px">'+
    '<span style="background:#fffbeb;padding:2px 10px;border-radius:6px;border:1px solid #fde68a">🟡 Fim de semana</span>'+
    '<span style="background:#fdf4ff;padding:2px 10px;border-radius:6px;border:1px solid #e9d5ff">🟣 Feriado</span>'+
    '<span style="background:#dbeafe;padding:2px 10px;border-radius:6px;border:1px solid #93c5fd">☀️ Manhã 08-18h</span>'+
    '<span style="background:#ede9fe;padding:2px 10px;border-radius:6px;border:1px solid #c4b5fd">🌙 Noite 18-08h</span></div>';

  if (!visEsc.length) {
    html += '<div class="empty">'+(S.esc.length===0?"Nenhuma escala gerada ainda":"Nenhuma escala para este filtro")+'</div>';
  } else {
    var rows = visEsc.map(function(e){
      var isHol=e.holiday||isFeriado(e.data); var isWk=e.weekend||isWE(e.data);
      var turno=e.turno||"normal"; var isManha=turno==="manha";
      var rc = isHol?"row-he":isWk?"row-we":"";
      var ini,fim,fimData;
      if (isManha){ ini="08:00"; fim="18:00"; fimData=e.data; }
      else { ini="18:00"; fim="08:00"; fimData=nextDay(e.data); }
      var turnoLabel = isManha
        ? '<span class="turno-badge turno-manha">☀️ 08-18h</span>'
        : '<span class="turno-badge turno-noite">🌙 18-08h</span>';
      var teamCells = TEAMS.map(function(t){
        var exts=(e.extras||[]).filter(function(x){ return x.time===t.id; });
        var sw=e.swapInfo&&e.swapInfo[t.id];
        var plId=e[t.id];
        if (!plId) return '<td><span style="color:#9ca3af;font-size:11px">—</span></td>';
        return '<td><div>'+badge(getNome(plId),t.id)+(sw?'<span style="font-size:11px;margin-left:3px">🔄</span>':"")+
          '</div>'+exts.map(function(x){ return '<div style="margin-top:3px">'+badge(getNome(x.id),t.id)+' <span class="tag tag-ex">extra</span></div>'; }).join("")+'</td>';
      }).join("");
      return '<tr class="'+rc+'">'+
        '<td><div style="font-weight:500">'+fmt(e.data)+'</div><div style="font-size:11px;color:#6b7280">'+dowFull(e.data)+'</div></td>'+
        '<td>'+turnoLabel+'</td>'+
        '<td>'+fmt(e.data)+' <span style="font-size:11px;color:#9ca3af">'+ini+'</span></td>'+
        '<td>'+fmt(fimData)+' <span style="font-size:11px;color:#9ca3af">'+fim+'</span></td>'+
        teamCells+
        '<td>'+(isHol?'<span class="tag tag-he">Feriado</span>':"")+(!isHol&&isWk?'<span class="tag tag-we">FdS</span>':"")+
        (e.swapInfo?'<span class="tag tag-sw">troca</span>':"")+
        (e.obs?'<div style="font-size:11px;color:#6b7280;margin-top:3px">'+he(e.obs)+'</div>':"")+
        '</td>'+
        '<td><div style="display:flex;gap:2px">'+
        '<button class="btn-icon" title="Editar" onclick="openEditEsc(\''+e.id+'\')">✏️</button>'+
        '<button class="btn-icon" title="Troca" onclick="openSwap(\''+e.id+'\')">🔄</button>'+
        '<button class="btn-icon" title="Remover" style="color:#9ca3af" onclick="removeEsc(\''+e.id+'\')">🗑️</button>'+
        '</div></td></tr>';
    }).join("");
    html += '<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table>'+
      '<thead><tr>'+["Dia","Turno","Início","Fim","Infra","SRE","Atendimento","Info","Ações"].map(function(h){ return '<th>'+h+'</th>'; }).join("")+'</tr></thead>'+
      '<tbody>'+rows+'</tbody></table></div></div>';
  }
  if (S.esc.length>0) html += '<p style="font-size:12px;color:#9ca3af;margin-top:10px">'+visEsc.length+' de '+S.esc.length+' entrada'+(S.esc.length!==1?"s":"")+'</p>';
  return html;
}

// ─── Plantonistas CRUD ────────────────────────────────────────────
function submitPl() {
  var nome = S.plName.trim();
  if (!nome) { S.plErr="Informe o nome."; render(); return; }
  var dup = S.pls.some(function(p){ return p.nome.toLowerCase()===nome.toLowerCase()&&p.time===S.plTeam&&p.id!==S.plEditId; });
  if (dup) { S.plErr="Já existe neste time."; render(); return; }
  var ativo = document.getElementById("pl-ativo") ? document.getElementById("pl-ativo").checked : S.plAtivo;
  if (S.plEditId) {
    S.pls = S.pls.map(function(p){
      return p.id===S.plEditId ? Object.assign({},p,{nome:nome,time:S.plTeam,phone:S.plPhone.trim(),ativo:ativo}) : p;
    });
    S.plEditId=null;
  } else {
    S.pls.push({ id:uid(), nome:nome, time:S.plTeam, phone:S.plPhone.trim(), ativo:ativo });
  }
  savePls(); S.plName=""; S.plPhone=""; S.plAtivo=true; S.plErr=""; render();
}
function startEditPl(id) {
  var p = S.pls.find(function(x){ return x.id===id; }); if (!p) return;
  S.plEditId=id; S.plName=p.nome; S.plTeam=p.time; S.plPhone=p.phone||""; S.plAtivo=p.ativo!==false; S.plErr="";
  render(); var el=document.getElementById("pl-name"); if(el) el.focus();
}
function cancelEditPl() { S.plEditId=null; S.plName=""; S.plPhone=""; S.plAtivo=true; S.plErr=""; render(); }
function removePl(id) {
  if (!confirm("Remover este plantonista?")) return;
  S.pls = S.pls.filter(function(p){ return p.id!==id; });
  S.aus = S.aus.filter(function(a){ return a.plId!==id; });
  savePls(); saveAus(); render();
}

// ─── Ausências ────────────────────────────────────────────────────
function openAusencias(plId) {
  var p = S.pls.find(function(x){ return x.id===plId; }); if (!p) return;
  S.ausPl = plId;
  document.getElementById("aus-subtitle").textContent = p.nome+" — "+p.time;
  renderAusList();
  openModal("modal-ausencias");
}
function renderAusList() {
  var el = document.getElementById("aus-list"); if (!el) return;
  var list = getAusenciasOf(S.ausPl);
  if (!list.length) { el.innerHTML='<div class="empty" style="padding:16px">Nenhuma ausência registrada</div>'; return; }
  el.innerHTML = '<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">'+
    list.map(function(a){
      var dias = dateRange(a.ini,a.fim).length;
      return '<div class="aus-item">'+
        '<span>'+ausenciaIcon(a.tipo)+'</span>'+
        '<span style="font-weight:500;font-size:12px">'+(AUS_TIPOS[a.tipo]||"Outros")+'</span>'+
        '<span style="color:#374151">'+fmt(a.ini)+'</span>'+
        '<span style="color:#6b7280">→</span>'+
        '<span style="color:#374151">'+fmt(a.fim)+'</span>'+
        '<span style="font-size:11px;color:#9ca3af">('+dias+' dia'+(dias!==1?"s":"")+')</span>'+
        (a.obs?'<span style="font-size:11px;color:#6b7280;font-style:italic">'+he(a.obs)+'</span>':"")+
        '<button class="btn-icon" style="margin-left:auto;color:#9ca3af" onclick="removeAusencia(\''+a.id+'\')">🗑️</button>'+
        '</div>';
    }).join("")+'</div>';
}
function addAusencia() {
  var tipo = document.getElementById("aus-tipo").value;
  var ini  = document.getElementById("aus-ini").value;
  var fim  = document.getElementById("aus-fim").value;
  var obs  = document.getElementById("aus-obs").value.trim();
  if (!ini||!fim) { alert("Informe as datas de início e fim."); return; }
  if (ini>fim) { alert("A data de início deve ser anterior ao fim."); return; }
  if (!S.ausPl) return;
  var overlap = S.aus.some(function(a){ return a.plId===S.ausPl && ini<=a.fim && fim>=a.ini; });
  if (overlap) { alert("Período se sobrepõe a uma ausência já cadastrada."); return; }
  S.aus.push({ id:uid(), plId:S.ausPl, tipo:tipo, ini:ini, fim:fim, obs:obs });
  S.aus.sort(function(a,b){ return a.ini.localeCompare(b.ini); });
  saveAus();
  document.getElementById("aus-ini").value="";
  document.getElementById("aus-fim").value="";
  document.getElementById("aus-obs").value="";
  renderAusList(); render();
}
function removeAusencia(id) {
  S.aus = S.aus.filter(function(a){ return a.id!==id; });
  saveAus(); renderAusList(); render();
}

// ─── Feriados ─────────────────────────────────────────────────────
function addFeriado() {
  var data=document.getElementById("fer-data").value;
  var nome=document.getElementById("fer-nome").value.trim();
  if (!data||!nome) return;
  if (S.fer.some(function(f){ return f.data===data; })) { alert("Feriado já cadastrado nessa data."); return; }
  S.fer.push({ id:uid(), data:data, nome:nome });
  S.fer.sort(function(a,b){ return a.data.localeCompare(b.data); });
  saveFer(); renderFerList(); render();
  document.getElementById("fer-nome").value=""; document.getElementById("fer-data").value="";
}
function removeFeriado(id) { S.fer=S.fer.filter(function(f){ return f.id!==id; }); saveFer(); renderFerList(); render(); }
function renderFerList() {
  var el=document.getElementById("fer-list"); if (!el) return;
  if (!S.fer.length) { el.innerHTML='<div class="empty" style="padding:20px">Nenhum feriado cadastrado</div>'; return; }
  el.innerHTML = '<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">'+
    S.fer.map(function(f){
      return '<div style="display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f3f4f6;gap:10px">'+
        '<span style="font-weight:500;font-size:13px">'+fmt(f.data)+'</span>'+
        '<span style="font-size:12px;color:#6b7280">'+dowFull(f.data)+'</span>'+
        '<span style="flex:1;font-size:13px">'+he(f.nome)+'</span>'+
        '<button class="btn-icon" style="color:#9ca3af" onclick="removeFeriado(\''+f.id+'\')">🗑️</button>'+
        '</div>';
    }).join("")+'</div>';
}

// ─── Modal Editar Escala ──────────────────────────────────────────
function openEditEsc(id) {
  var e=S.esc.find(function(x){ return x.id===id; }); if (!e) return;
  S.editId=id; S.editExtras=(e.extras||[]).slice(); S.editObs=e.obs||"";
  var turno=e.turno||"normal";
  var turnoStr=turno==="manha"?"☀️ Manhã (08-18h)":"🌙 Noite (18-08h)";
  document.getElementById("edit-title").textContent=fmt(e.data)+" — "+turnoStr;
  document.getElementById("edit-dow").textContent=dowFull(e.data);
  document.getElementById("edit-obs").value=S.editObs;
  document.getElementById("edit-current").innerHTML=
    '<p style="font-size:12px;font-weight:600;margin-bottom:8px;color:#374151">Escala atual</p>'+
    '<div class="flex-row">'+TEAMS.map(function(t){
      var plId=e[t.id]; if (!plId) return "";
      return badge(getNome(plId),t.id)+' <span style="font-size:11px;color:#6b7280">('+t.label+')</span>';
    }).join(" ")+'</div>';
  renderEditExtraChips(); renderEditExtraPl(e);
  openModal("modal-edit");
}
function renderEditExtraChips() {
  var el=document.getElementById("edit-extras-chips"); if (!el) return;
  el.innerHTML = S.editExtras.map(function(x){
    var t2=tc(x.time);
    return '<span class="badge" style="background:'+t2.bg+';color:'+t2.c+';display:inline-flex;align-items:center;gap:4px">'+
      he(getNome(x.id))+' ('+(TEAMS.find(function(t){ return t.id===x.time; })||{label:"?"}).label+')'+
      '<button onclick="S.editExtras=S.editExtras.filter(function(e){return!(e.id===\''+x.id+'\'&&e.time===\''+x.time+'\')});renderEditExtraChips()" style="background:none;border:none;cursor:pointer;font-size:12px;color:inherit;padding:0;line-height:1">✕</button>'+
      '</span>';
  }).join("");
}
function renderEditExtraPl(escEntry) {
  var el=document.getElementById("edit-extra-pl"); if (!el) return;
  var e=escEntry||S.esc.find(function(x){ return x.id===S.editId; }); if (!e) return;
  var escalados=TEAMS.map(function(t){ return e[t.id]; }).filter(Boolean);
  var disp=S.pls.filter(function(p){
    return p.ativo!==false && escalados.indexOf(p.id)===-1 &&
      !S.editExtras.some(function(x){ return x.id===p.id; });
  });
  el.innerHTML='<option value="">Selecione plantonista...</option>'+
    TEAMS.map(function(t){
      return '<optgroup label="'+t.label+'">'+disp.filter(function(p){ return p.time===t.id; }).map(function(p){
        return '<option value="'+p.id+'">'+he(p.nome)+'</option>';
      }).join("")+'</optgroup>';
    }).join("");
}
function addExtra() {
  var pl=document.getElementById("edit-extra-pl").value;
  var team=document.getElementById("edit-extra-team").value;
  if (!pl) return;
  if (S.editExtras.some(function(x){ return x.id===pl; })) return;
  S.editExtras.push({id:pl,time:team});
  renderEditExtraChips(); renderEditExtraPl();
}
function saveEditEsc() {
  var obs=document.getElementById("edit-obs").value;
  S.esc=S.esc.map(function(e){ return e.id===S.editId?Object.assign({},e,{extras:S.editExtras,obs:obs}):e; });
  saveEsc(); closeModal("modal-edit"); render();
}

// ─── Modal Troca ──────────────────────────────────────────────────
function openSwap(id) {
  var e=S.esc.find(function(x){ return x.id===id; }); if (!e) return;
  S.swapId=id; S.swapTeam="infra";
  var turno=e.turno||"normal";
  var turnoStr=turno==="manha"?"☀️ Manhã":"🌙 Noite";
  document.getElementById("swap-subtitle").textContent=fmt(e.data)+" — "+dowFull(e.data)+" ("+turnoStr+")";
  renderSwapTeamBtns(); renderSwapCurrent(); renderSwapTarget();
  openModal("modal-swap");
}
function renderSwapTeamBtns() {
  var el=document.getElementById("swap-team-btns"); if (!el) return;
  el.innerHTML=TEAMS.map(function(t){
    var t2=tc(t.id);
    return '<button class="btn" style="font-size:12px;padding:5px 12px;'+(S.swapTeam===t.id?"background:"+t2.bg+";color:"+t2.c+";border-color:"+t2.c:"")+
      '" onclick="S.swapTeam=\''+t.id+'\';renderSwapTeamBtns();renderSwapCurrent();renderSwapTarget()">'+t.label+'</button>';
  }).join("");
}
function renderSwapCurrent() {
  var el=document.getElementById("swap-current"); if (!el) return;
  var e=S.esc.find(function(x){ return x.id===S.swapId; }); if (!e) return;
  var tlabel=(TEAMS.find(function(t){ return t.id===S.swapTeam; })||{label:"?"}).label;
  el.innerHTML='<strong style="font-size:13px">Plantonista atual ('+tlabel+'):</strong> '+badge(getNome(e[S.swapTeam]),S.swapTeam);
}
function renderSwapTarget() {
  var el=document.getElementById("swap-target"); if (!el) return;
  var others=S.esc.filter(function(e){ return e.id!==S.swapId&&e[S.swapTeam]; });
  el.innerHTML='<option value="">Selecione um dia...</option>'+others.map(function(e){
    var turnoStr=e.turno==="manha"?"☀️":"🌙";
    return '<option value="'+e.id+'">'+fmt(e.data)+' ('+dowFull(e.data)+') '+turnoStr+' - '+he(getNome(e[S.swapTeam]))+'</option>';
  }).join("");
  updateSwapPreview();
}
function updateSwapPreview() {
  var el=document.getElementById("swap-preview"); if (!el) return;
  var tid=document.getElementById("swap-target"); var targetId=tid?tid.value:"";
  if (!targetId) { el.innerHTML=""; return; }
  var eA=S.esc.find(function(x){ return x.id===S.swapId; });
  var eB=S.esc.find(function(x){ return x.id===targetId; });
  if (!eA||!eB) { el.innerHTML=""; return; }
  el.innerHTML='<div style="background:#ede9fe;border-radius:8px;padding:10px 14px;font-size:12px;color:#5b21b6">'+
    '<strong>Resultado da troca:</strong><br>'+
    fmt(eA.data)+': <strong>'+he(getNome(eB[S.swapTeam]))+'</strong> (era '+he(getNome(eA[S.swapTeam]))+')'+
    '<br>'+fmt(eB.data)+': <strong>'+he(getNome(eA[S.swapTeam]))+'</strong> (era '+he(getNome(eB[S.swapTeam]))+')'+
    '</div>';
}
function confirmSwap() {
  var tid=document.getElementById("swap-target"); var targetId=tid?tid.value:"";
  var obs=document.getElementById("swap-obs")?document.getElementById("swap-obs").value:"";
  if (!targetId) return;
  var eA=S.esc.find(function(x){ return x.id===S.swapId; });
  var eB=S.esc.find(function(x){ return x.id===targetId; });
  if (!eA||!eB) return;
  var plA=eA[S.swapTeam]; var plB=eB[S.swapTeam];
  var swapTeam = S.swapTeam;
  S.esc=S.esc.map(function(e){
    if (e.id===eA.id) {
      var si=Object.assign({},e.swapInfo||{}); si[swapTeam]=true;
      var newObs=obs?((e.obs?e.obs+" | ":"")+"Troca: "+obs):e.obs;
      var upd={}; upd[swapTeam]=plB; upd.swapInfo=si; upd.obs=newObs;
      return Object.assign({},e,upd);
    }
    if (e.id===eB.id) {
      var si2=Object.assign({},e.swapInfo||{}); si2[swapTeam]=true;
      var upd2={}; upd2[swapTeam]=plA; upd2.swapInfo=si2;
      return Object.assign({},e,upd2);
    }
    return e;
  });
  saveEsc(); closeModal("modal-swap"); render();
}

// ─── UI helpers ───────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function setTab(t) { S.tab=t; render(); }
function bindEvents() {
  document.querySelectorAll(".modal-overlay").forEach(function(el){
    el.addEventListener("click",function(ev){ if(ev.target===el) el.classList.remove("open"); });
  });
}

// Polyfill IE
if (!Object.assign) Object.assign=function(t){
  for(var i=1;i<arguments.length;i++){var s=arguments[i];for(var k in s){if(Object.prototype.hasOwnProperty.call(s,k))t[k]=s[k];}}return t;
};

// ─── Init ─────────────────────────────────────────────────────────
initStorage(function(){ render(); });
</script>
</body>
